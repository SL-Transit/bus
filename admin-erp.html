<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SL-Transit Admin ERP</title><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{margin:0;background:#f4f6f8;color:#17202a;font-family:Kanit,system-ui,sans-serif}button,input,textarea{font:inherit}button{border:1px solid #d8dee6;background:#fff;border-radius:6px;min-height:34px;padding:0 10px;cursor:pointer}button:disabled{opacity:.5}.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{background:#132026;color:#edf6f9;padding:18px}.brand{font-size:20px;font-weight:700;margin-bottom:18px}.nav button{display:block;width:100%;text-align:left;margin:6px 0;background:transparent;color:#d8e7ec;border-color:transparent}.nav .on{background:#20343d;color:#fff;border-color:#2f4d59}.top{background:#fff;border-bottom:1px solid #d8dee6;padding:14px 22px;display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{font-size:22px;margin:0}.top p{margin:2px 0 0;color:#667085;font-size:13px}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid #d8dee6;border-radius:999px;padding:5px 10px;background:#fff;color:#667085;font-size:12px}.ok{background:#ecfdf3;color:#067647;border-color:#abefc6}.warn{background:#fffaeb;color:#a15c07;border-color:#fedf89}.bad{background:#fef3f2;color:#b42318;border-color:#fecdca}.notice{display:none;margin:16px 22px 0;padding:10px 12px;border:1px solid #fedf89;background:#fffaeb;color:#7a4b00;border-radius:6px}.content{padding:18px 22px 28px}.bar{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.primary{background:#0f766e;color:#fff;border-color:#0f766e}.grid{display:grid;grid-template-columns:minmax(330px,1fr) minmax(330px,.9fr);gap:16px}.panel{background:#fff;border:1px solid #d8dee6;border-radius:8px}.ph{padding:12px 14px;border-bottom:1px solid #d8dee6;font-weight:600}.row{display:grid;grid-template-columns:34px 42px 1fr auto;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid #eef1f4}.row.drag{opacity:.5}.handle{cursor:grab;color:#667085}.name strong{display:block}.name span{color:#667085;font-size:12px}.form{padding:14px;display:grid;gap:10px}.tw{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:grid;gap:4px;color:#667085;font-size:12px}input,textarea{width:100%;box-sizing:border-box;border:1px solid #d8dee6;border-radius:6px;padding:7px 9px}textarea{min-height:74px}.actions{display:flex;gap:8px;flex-wrap:wrap}.empty{padding:24px;color:#667085;text-align:center}@media(max-width:900px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.top{display:block}.pills{margin-top:10px}}</style></head><body><div class="app"><aside class="side"><div class="brand">SL-Transit ERP</div><nav class="nav"><button class="on">ป้ายรถ</button><button disabled>เส้นทาง</button><button disabled>เที่ยวรถ</button><button disabled>ราคา</button><button disabled>รถและคิว</button></nav></aside><main><header class="top"><div><h1>Stops Manager</h1><p>จัดการลำดับป้าย จุดต่อรถ และจุดตัดข้ามกลุ่ม</p></div><div class="pills"><span id="cfg" class="pill warn">ตรวจ config</span><span id="core" class="pill warn">core ยังไม่พร้อม</span><span id="data" class="pill warn">ยังไม่โหลดข้อมูล</span></div></header><div id="notice" class="notice"></div><section class="content"><div class="bar"><strong>ป้ายรถ</strong><div class="actions"><button id="reload">รีเฟรช</button><button id="newStop" class="primary">เพิ่มป้าย</button><button id="saveOrder" class="primary" disabled>บันทึกลำดับ</button></div></div><div class="grid"><section class="panel"><div class="ph">ลำดับป้าย <span id="count" class="pill">0</span></div><div id="list"><div class="empty">ยังไม่มีข้อมูล</div></div></section><section class="panel"><div class="ph" id="formTitle">รายละเอียดป้าย</div><form id="form" class="form"><div class="tw"><label>Stop key<input id="key" required></label><label>Order<input id="order" type="number" min="1"></label></div><div class="tw"><label>ชื่อไทย<input id="nameTh" required></label><label>ชื่ออังกฤษ<input id="nameEn"></label></div><div class="tw"><label>Lat<input id="lat"></label><label>Lng<input id="lng"></label></div><div class="tw"><label>Icon<input id="icon"></label><label>Stop type<input id="type" value="main"></label></div><div class="tw"><label>Bookable<input id="bookable" type="checkbox" checked></label><label>Active<input id="active" type="checkbox" checked></label></div><label>Notes<textarea id="notes"></textarea></label><label>transferOptions JSON<textarea id="transfer">{}</textarea></label><label>crossPoints JSON<textarea id="cross">{}</textarea></label><div class="actions"><button id="save" class="primary" disabled>บันทึกป้าย</button><button id="clear" type="button">ล้างฟอร์ม</button></div></form></section></div></section></main></div><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script><script src="erp-data-adapter.js"></script><script src="erp-core.js"></script><script>var FIREBASE_CONFIG_NEW={apiKey:'TODO_FROM_FIREBASE_CONSOLE',authDomain:'sl-transit-9464e.firebaseapp.com',databaseURL:'https://sl-transit-9464e-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'sl-transit-9464e',storageBucket:'sl-transit-9464e.firebasestorage.app',messagingSenderId:'TODO_FROM_FIREBASE_CONSOLE',appId:'TODO_FROM_FIREBASE_CONSOLE'};var S={stops:[],selected:'',ready:false,dirty:false};function $(id){return document.getElementById(id)}function pill(id,t,c){$(id).className='pill '+(c||'');$(id).textContent=t}function note(t,bad){var n=$('notice');n.style.display=t?'block':'none';n.textContent=t||'';n.style.background=bad?'#fef3f2':'#fffaeb'}function cfgOk(){return FIREBASE_CONFIG_NEW.apiKey.indexOf('TODO_')!==0&&FIREBASE_CONFIG_NEW.appId.indexOf('TODO_')!==0}function jread(id){try{return JSON.parse($(id).value||'{}')}catch(e){throw new Error(id+' JSON ไม่ถูกต้อง')}}function norm(x,i){x=x||{};return Object.assign({},x,{stopKey:x.stopKey||x.id||x.key||'',nameTh:x.nameTh||x.stopNameTh||x.name||x.stopTh||'',order:Number(x.order||i+1),bookable:x.bookable!==false&&x.bookingEnabled!==false,active:x.active!==false,transferOptions:x.transferOptions||{},crossPoints:x.crossPoints||{}})}function sort(a){return a.slice().sort(function(x,y){return Number(x.order||999999)-Number(y.order||999999)||String(x.stopKey).localeCompare(String(y.stopKey))})}function render(){S.stops=sort(S.stops);$('count').textContent=S.stops.length;var l=$('list');if(!S.stops.length){l.innerHTML='<div class="empty">ยังไม่มีข้อมูล</div>';return}l.innerHTML='';S.stops.forEach(function(s,i){var r=document.createElement('div');r.className='row';r.draggable=S.ready;r.dataset.key=s.stopKey;r.innerHTML='<div class="handle">☰</div><div>'+(i+1)+'</div><div class="name"><strong></strong><span></span></div><button type="button">แก้</button>';r.querySelector('strong').textContent=s.nameTh||s.stopKey;r.querySelector('span').textContent=s.stopKey+(s.bookable?'':' · ไม่เปิดจอง');r.querySelector('button').onclick=function(){select(s.stopKey)};r.ondragstart=function(e){r.classList.add('drag');e.dataTransfer.setData('text/plain',s.stopKey)};r.ondragend=function(){r.classList.remove('drag')};r.ondragover=function(e){e.preventDefault()};r.ondrop=function(e){e.preventDefault();move(e.dataTransfer.getData('text/plain'),s.stopKey)};l.appendChild(r)})}function select(k){S.selected=k;var s=S.stops.find(function(x){return x.stopKey===k});if(!s)return;$('formTitle').textContent='รายละเอียดป้าย: '+(s.nameTh||s.stopKey);$('key').value=s.stopKey;$('key').disabled=true;$('order').value=s.order||'';$('nameTh').value=s.nameTh||'';$('nameEn').value=s.nameEn||'';$('lat').value=s.lat==null?'':s.lat;$('lng').value=s.lng==null?'':s.lng;$('icon').value=s.icon||'';$('type').value=s.stopType||'main';$('bookable').checked=s.bookable!==false;$('active').checked=s.active!==false;$('notes').value=s.notes||s.note||'';$('transfer').value=JSON.stringify(s.transferOptions||{},null,2);$('cross').value=JSON.stringify(s.crossPoints||{},null,2);$('save').disabled=!S.ready}function clearForm(){S.selected='';$('form').reset();$('key').disabled=false;$('bookable').checked=true;$('active').checked=true;$('transfer').value='{}';$('cross').value='{}';$('save').disabled=!S.ready}function payload(){var k=$('key').value.trim();return{key:k,data:{stopKey:k,nameTh:$('nameTh').value.trim(),nameEn:$('nameEn').value.trim(),order:Number($('order').value||S.stops.length+1),lat:$('lat').value===''?null:Number($('lat').value),lng:$('lng').value===''?null:Number($('lng').value),icon:$('icon').value.trim(),stopType:$('type').value.trim()||'main',bookable:$('bookable').checked,active:$('active').checked,notes:$('notes').value.trim(),transferOptions:jread('transfer'),crossPoints:jread('cross')}}}function move(a,b){if(!a||!b||a===b)return;var x=S.stops.slice(),i=x.findIndex(function(s){return s.stopKey===a}),j=x.findIndex(function(s){return s.stopKey===b});if(i<0||j<0)return;var m=x.splice(i,1)[0];x.splice(j,0,m);S.stops=x.map(function(s,n){return Object.assign({},s,{order:n+1})});S.dirty=true;$('saveOrder').disabled=!S.ready;render()}function load(){if(!S.ready)return Promise.resolve();pill('data','กำลังโหลด','warn');return SLTransit.db.refreshCatalog().then(function(){return SLTransit.db.getStops()}).then(function(stops){S.stops=sort((stops||[]).map(norm));S.dirty=false;$('saveOrder').disabled=true;render();if(S.stops[0]&&!S.selected)select(S.stops[0].stopKey);pill('data','โหลดแล้ว','ok')}).catch(function(e){pill('data','โหลดไม่สำเร็จ','bad');note('โหลด stops ไม่สำเร็จ: '+e.message,true)})}function init(){$('reload').onclick=load;$('newStop').onclick=clearForm;$('clear').onclick=clearForm;$('saveOrder').onclick=function(){if(!S.ready||!S.dirty)return;SLTransit.db.reorderStops(S.stops.map(function(s){return s.stopKey})).then(load).catch(function(e){note('บันทึกลำดับไม่สำเร็จ: '+e.message,true)})};$('form').onsubmit=function(e){e.preventDefault();if(!S.ready)return;var p;try{p=payload()}catch(err){note(err.message,true);return}if(!p.key){note('กรุณาระบุ stop key',true);return}SLTransit.db.saveStop(p.key,p.data).then(function(){S.selected=p.key;return load()}).catch(function(err){note('บันทึกป้ายไม่สำเร็จ: '+err.message,true)})};if(!cfgOk()){pill('cfg','ต้องตั้งค่า Firebase','warn');pill('core','ยังไม่ init','warn');note('ยังไม่มี apiKey/appId ของ sl-transit-9464e ใน repo จึงเปิดให้ตรวจ UI ก่อน และยังไม่เชื่อม Firebase',false);render();return}pill('cfg','config พร้อม','ok');try{var app=firebase.initializeApp(FIREBASE_CONFIG_NEW);SLTransit.core.init(app).then(function(){S.ready=true;pill('core','core พร้อม','ok');$('save').disabled=false;return load()}).catch(function(e){pill('core','core error','bad');note('เริ่ม ERP core ไม่สำเร็จ: '+e.message,true)})}catch(e){pill('cfg','config error','bad');note(e.message,true)}}document.addEventListener('DOMContentLoaded',init);</script></body></html>
