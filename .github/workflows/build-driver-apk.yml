name: Build Driver APK

on:
  workflow_dispatch:
  push:
    paths:
      - "driver-android/**"
      - "build.gradle"
      - "gradle.properties"
      - "settings.gradle"
      - ".github/workflows/build-driver-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7" 
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > driver-android/keystore.jks
      
      - name: Build release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SL_TRANSIT_FIREBASE_API_KEY: ${{ secrets.SL_TRANSIT_FIREBASE_API_KEY }}
          SL_TRANSIT_FIREBASE_APP_ID: ${{ secrets.SL_TRANSIT_FIREBASE_APP_ID }}
          SL_TRANSIT_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.SL_TRANSIT_FIREBASE_MESSAGING_SENDER_ID }}
        run: gradle :driver-android:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanamchai-driver-gps-apk
          path: driver-android/build/outputs/apk/release/driver-android-release.apk
