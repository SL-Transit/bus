name: Build Driver APK

on:
  workflow_dispatch:
  push:
    paths:
      - "driver-android/**"
      - "build.gradle"
      - "gradle.properties"
      - "settings.gradle"
      - ".github/workflows/build-driver-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7" 
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > driver-android/keystore.jks
      
      - name: Build release APK
        id: build
        continue-on-error: true
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SL_TRANSIT_FIREBASE_API_KEY: ${{ secrets.SL_TRANSIT_FIREBASE_API_KEY }}
          SL_TRANSIT_FIREBASE_APP_ID: ${{ secrets.SL_TRANSIT_FIREBASE_APP_ID }}
          SL_TRANSIT_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.SL_TRANSIT_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          set -o pipefail
          gradle :driver-android:assembleRelease --console=plain 2>&1 | tee build.log

      - name: Post compile error as commit comment (on failure)
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tail -c 60000 build.log > build_tail.log
          python3 - <<'PYEOF'
          import json, os, subprocess
          with open("build_tail.log", "r", errors="replace") as f:
              body = f.read()
          body = "```\n" + body[-60000:] + "\n```"
          payload = json.dumps({"body": body})
          with open("comment_payload.json", "w") as f:
              f.write(payload)
          PYEOF
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @comment_payload.json

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Debug list APK outputs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== find driver-android/build/outputs ===" > outputs_listing.txt
          find driver-android/build/outputs -type f 2>&1 >> outputs_listing.txt || true
          echo "=== apk dir tree ===" >> outputs_listing.txt
          find driver-android/build/outputs/apk -maxdepth 5 2>&1 >> outputs_listing.txt || true
          cat outputs_listing.txt
          python3 - <<'PYEOF'
          import json
          with open("outputs_listing.txt", "r", errors="replace") as f:
              body = f.read()
          body = "APK output listing:\n```\n" + body[-50000:] + "\n```"
          with open("outputs_comment.json", "w") as f:
              json.dump({"body": body}, f)
          PYEOF
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @outputs_comment.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanamchai-driver-gps-apk
          path: driver-android/build/outputs/apk/release/*.apk
          if-no-files-found: error
