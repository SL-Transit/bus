<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รถโดยสาร สนามชัยเขต–ฉะเชิงเทรา</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange:#f97316; --orange-dk:#c2410c; --bg:#fafaf8; --card:#fff;
  --text:#1c1917; --muted:#78716c; --border:#e7e5e4;
  --green:#16a34a; --yellow:#ca8a04; --red:#dc2626;
}
body { font-family:'Kanit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.topbar { background:var(--orange); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(249,115,22,0.3); }
.route-badge { background:rgba(0,0,0,0.2); border-radius:8px; padding:4px 12px; font-family:'Chakra Petch',sans-serif; font-size:20px; font-weight:700; color:#fff; }
.route-name { color:#fff; font-size:12px; text-align:center; line-height:1.4; }
.route-name strong { font-size:14px; font-weight:700; display:block; }
.live-pill { background:rgba(0,0,0,0.2); border-radius:20px; padding:5px 10px; display:flex; align-items:center; gap:5px; font-size:11px; color:#fff; font-weight:600; }
.live-dot { width:7px;height:7px;background:#4ade80;border-radius:50%;animation:blink 1.2s infinite;box-shadow:0 0 5px #4ade80; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock-strip { background:var(--orange-dk); padding:7px 18px; display:flex; justify-content:space-between; align-items:center; }
.clock-strip .time { font-family:'Chakra Petch',sans-serif; font-size:16px; color:#fed7aa; letter-spacing:2px; }
.clock-strip .date { font-size:12px; color:#fdba74; }
.main { padding:14px 16px; max-width:480px; margin:0 auto; }

/* BIG STATUS CARD */
.big-status {
  border-radius:16px; padding:18px 20px; margin-bottom:14px;
  display:flex; align-items:center; gap:16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
  transition:all 0.4s;
}
.big-status.stopped   { background:linear-gradient(135deg,#fff7ed,#ffedd5); border:2px solid #fed7aa; }
.big-status.moving    { background:linear-gradient(135deg,#f0fdf4,#dcfce7); border:2px solid #86efac; }
.big-status.approaching { background:linear-gradient(135deg,#fefce8,#fef9c3); border:2px solid #fde047; }
.big-status.no-data   { background:var(--card); border:1.5px solid var(--border); }

.bs-icon { font-size:38px; flex-shrink:0; }
.bs-body {}
.bs-title { font-size:17px; font-weight:700; line-height:1.2; margin-bottom:3px; }
.big-status.stopped   .bs-title { color:var(--orange-dk); }
.big-status.moving    .bs-title { color:#15803d; }
.big-status.approaching .bs-title { color:#92400e; }
.big-status.no-data   .bs-title { color:var(--muted); }
.bs-sub { font-size:12px; color:var(--muted); }

/* Approaching alert */
.approach-alert {
  background:linear-gradient(135deg,#fefce8,#fef9c3);
  border:2px solid #fde047;
  border-radius:12px; padding:12px 16px;
  display:flex; align-items:center; gap:10px;
  margin-bottom:14px;
  animation:pulse-border 1.5s infinite;
}
@keyframes pulse-border{0%,100%{border-color:#fde047}50%{border-color:#f59e0b}}
.approach-alert.hidden { display:none; }
.approach-text strong { display:block; font-size:15px; font-weight:700; color:#92400e; }
.approach-text span { font-size:12px; color:#a16207; }

#map { height:220px; border-radius:12px; margin-bottom:14px; border:1px solid var(--border); z-index:1; }

.route-card { background:var(--card); border-radius:14px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.05); margin-bottom:14px; border:1px solid var(--border); }
.route-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:1px; margin-bottom:12px; }
.route-visual { display:flex; align-items:flex-start; }
.stop-col { display:flex; flex-direction:column; align-items:center; flex:1; }
.stop-dot-w { position:relative; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
.stop-dot { width:20px;height:20px;border-radius:50%;background:#d6d3d1;border:3px solid #fff;box-shadow:0 0 0 2px #d6d3d1;transition:all 0.4s;z-index:2; }
.stop-dot.active { background:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,0.25);transform:scale(1.2); }
.stop-dot.passed { background:var(--orange);opacity:0.45; }
.bus-anim { position:absolute;top:-22px;font-size:20px;animation:bob 1.5s infinite; }
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.line-seg { flex:1;height:4px;background:#d6d3d1;margin-top:16px;border-radius:2px; }
.line-seg.passed { background:var(--orange);opacity:0.5; }
.sn { font-size:11px;font-weight:600;color:var(--text);text-align:center;margin-top:7px;line-height:1.3; }
.sn.active { color:var(--orange); }

.update-bar { background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:9px 14px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:14px; }

.dir-tabs { display:flex; background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:14px; }
.dir-tab { flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:'Kanit',sans-serif;transition:all 0.2s; }
.dir-tab.active { background:var(--orange);color:#fff; }

.sec-label { font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px; }

.next-bus { background:linear-gradient(135deg,#fff7ed,#ffedd5);border:1.5px solid #fed7aa;border-radius:12px;padding:12px 16px;margin-bottom:14px; }
.next-label { font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.5px;margin-bottom:4px; }
.next-time { font-family:'Chakra Petch',sans-serif;font-size:28px;font-weight:700;color:var(--orange-dk);letter-spacing:2px; }
.next-detail { font-size:12px;color:var(--muted);margin-top:2px; }

.sched-card { background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);margin-bottom:14px;border:1px solid var(--border); }
.sched-head { background:var(--text);padding:11px 14px;display:grid;grid-template-columns:50px 1fr 1fr 1fr;gap:4px;font-size:11px;color:#d4d0cb;font-weight:600; }
.trip-row { padding:11px 14px;display:grid;grid-template-columns:50px 1fr 1fr 1fr;gap:4px;align-items:center;border-bottom:1px solid var(--border); }
.trip-row:last-child{border-bottom:none;}
.trip-row.cur{background:#fff7ed;border-left:3px solid var(--orange);}
.trip-row.done-row{opacity:0.4;}
.queue-badge{font-size:10px;font-weight:700;background:#f1f5f9;color:#64748b;border-radius:6px;padding:2px 6px;display:inline-block;}
.trip-row.cur .queue-badge{background:#ffedd5;color:var(--orange-dk);}
.t-cell{font-size:13px;font-weight:500;}
.done{text-decoration:line-through;color:var(--muted);}
.now-b{display:inline-block;background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;margin-left:2px;vertical-align:middle;}

.footer{text-align:center;font-size:11px;color:var(--muted);padding:6px 0 22px;}
.footer a{color:var(--orange);font-weight:600;text-decoration:none;}
</style>
</head>
<body>
<div class="topbar">
  <div class="route-badge">สาย 1</div>
  <div class="route-name"><strong>สนามชัยเขต ↔ ฉะเชิงเทรา</strong>รถโดยสารประจำทาง</div>
  <div class="live-pill"><div class="live-dot"></div>LIVE</div>
</div>
<div class="clock-strip">
  <div class="time" id="clock">--:--:--</div>
  <div class="date" id="dateText"></div>
</div>

<div class="main">

  <!-- BIG STATUS -->
  <div class="big-status no-data" id="bigStatus">
    <div class="bs-icon" id="bsIcon">🚌</div>
    <div class="bs-body">
      <div class="bs-title" id="bsTitle">กำลังโหลด...</div>
      <div class="bs-sub" id="bsSub">รอข้อมูลจากรถ</div>
    </div>
  </div>

  <!-- Approaching alert -->
  <div class="approach-alert hidden" id="approachAlert">
    <div style="font-size:28px">⚠️</div>
    <div class="approach-text">
      <strong id="approachTitle">รถกำลังใกล้จะถึง!</strong>
      <span id="approachSub">เตรียมตัวขึ้นรถได้เลย</span>
    </div>
  </div>

  <div id="map"></div>

  <div class="route-card">
    <div class="route-label">ตำแหน่งรถปัจจุบัน</div>
    <div class="route-visual" id="routeVisual"></div>
  </div>

  <div class="update-bar">🟢 อัปเดตเรียลไทม์ — <span id="lastUpdate">รอข้อมูล</span></div>

  <div class="next-bus">
    <div class="next-label">🕐 รถคันถัดไป</div>
    <div class="next-time" id="nextTime">--:--</div>
    <div class="next-detail" id="nextDetail">กำลังคำนวณ...</div>
  </div>

  <div class="dir-tabs">
    <button class="dir-tab active" id="tabGo">▶ ขาไป</button>
    <button class="dir-tab" id="tabBack">◀ ขากลับ</button>
  </div>

  <div class="sec-label">ตารางเวลาทุกคิว</div>
  <div class="sched-card">
    <div class="sched-head" id="schedHead"></div>
    <div id="schedBody"></div>
  </div>

  <div class="footer">คนขับรถ? <a href="driver.html">เปิดหน้าคนขับ →</a></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3HmQyRJfpw931mr_6eL19xzFk2bbqfVI",
  authDomain: "bus-line1-ba0ea.firebaseapp.com",
  databaseURL: "https://bus-line1-ba0ea-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bus-line1-ba0ea",
  storageBucket: "bus-line1-ba0ea.firebasestorage.app",
  messagingSenderId: "511401517598",
  appId: "1:511401517598:web:5605ee3777619dffe1c40f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const STOPS_GO = [
  {name:'ท่ารถสนามชัยเขต',lat:13.659022,lng:101.437482},
  {name:'พนมสารคาม',       lat:13.745082,lng:101.355993},
  {name:'ขนส่งฉะเชิงเทรา',lat:13.692477,lng:101.054105},
];
const STOPS_BACK = [
  {name:'ขนส่งฉะเชิงเทรา',lat:13.692477,lng:101.054105},
  {name:'พนมสารคาม',       lat:13.745259,lng:101.356835},
  {name:'ท่ารถสนามชัยเขต',lat:13.659022,lng:101.437482},
];
const TRIPS_GO = [
  {q:3,times:['06:20','06:40','07:20']},{q:1,times:['09:00','09:20','10:00']},
  {q:2,times:['10:40','11:00','11:40']},{q:3,times:['12:10','12:30','13:10']},
  {q:2,times:['13:40','14:00','14:40']},{q:4,times:['14:00','14:20','15:00']},
];
const TRIPS_BACK = [
  {q:3,times:['09:40','10:20','10:40']},{q:1,times:['11:20','12:00','12:20']},
  {q:2,times:['12:20','13:00','13:30']},{q:3,times:['14:00','14:40','15:00']},
  {q:2,times:['15:20','16:00','16:20']},{q:4,times:['16:20','17:00','17:20']},
];

let viewDir='go', lastPos=null;

// Map
const map=L.map('map').setView([13.710,101.245],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
L.polyline(STOPS_GO.map(s=>[s.lat,s.lng]),  {color:'#f97316',weight:4,opacity:0.7}).addTo(map);
L.polyline(STOPS_BACK.map(s=>[s.lat,s.lng]),{color:'#3b82f6',weight:3,opacity:0.4,dashArray:'6,4'}).addTo(map);
STOPS_GO.forEach(s=>L.circleMarker([s.lat,s.lng],{radius:8,fillColor:'#f97316',color:'#fff',weight:2,fillOpacity:1}).addTo(map).bindPopup(s.name));
const busIcon=L.divIcon({html:'<div style="font-size:26px;line-height:1">🚌</div>',className:'',iconAnchor:[13,13]});
let busMarker=null;

function toMin(hhmm){const[h,m]=hhmm.split(':').map(Number);return h*60+m;}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function curStops(){return viewDir==='go'?STOPS_GO:STOPS_BACK;}
function curTrips(){return viewDir==='go'?TRIPS_GO:TRIPS_BACK;}

function findCurTrip(){
  const trips=curTrips(),now=nowMin();
  for(let i=0;i<trips.length;i++){
    if(now>=toMin(trips[i].times[0])-5&&now<=toMin(trips[i].times[2])+10) return i;
  }
  return null;
}

function findNextTrip(){
  const trips=curTrips(),now=nowMin();
  for(let i=0;i<trips.length;i++) if(toMin(trips[i].times[0])>now) return i;
  return null;
}

// ===== BIG STATUS =====
function renderBigStatus(pos){
  const card=document.getElementById('bigStatus');
  const icon=document.getElementById('bsIcon');
  const title=document.getElementById('bsTitle');
  const sub=document.getElementById('bsSub');
  const alert=document.getElementById('approachAlert');

  if(!pos){
    card.className='big-status no-data';
    icon.textContent='🚌'; title.textContent='ยังไม่มีข้อมูล'; sub.textContent='รอคนขับเปิดหน้าคนขับ';
    alert.className='approach-alert hidden';
    return;
  }

  const elapsed=Math.round((Date.now()-pos.ts)/60000);
  const dir=pos.direction==='back'?STOPS_BACK:STOPS_GO;
  const stopName=dir[pos.stopIdx]?.name||'?';
  const nextStop=dir[(pos.stopIdx||0)+1];
  const qLabel=pos.queue?`คิว ${pos.queue}`:'';
  const timeStr=elapsed===0?'เพิ่งอัปเดต':`${elapsed} นาทีที่แล้ว`;

  // approaching alert
  if(pos.status==='approaching' && nextStop){
    alert.className='approach-alert';
    document.getElementById('approachTitle').textContent=`รถกำลังใกล้จะถึง ${nextStop.name}!`;
    document.getElementById('approachSub').textContent=
      pos.distToNext?`ระยะห่างประมาณ ${Math.round(pos.distToNext)} เมตร · ${qLabel}`:`${qLabel} · ${timeStr}`;
  } else {
    alert.className='approach-alert hidden';
  }

  if(pos.status==='stopped'){
    card.className='big-status stopped';
    icon.textContent='🛑';
    title.textContent=`จอดรอผู้โดยสาร ที่ ${stopName}`;
    sub.textContent=`${qLabel} · ${timeStr}`;
  } else if(pos.status==='approaching'){
    card.className='big-status approaching';
    icon.textContent='⚠️';
    title.textContent=`กำลังใกล้จะถึง ${nextStop?.name||stopName}`;
    sub.textContent=`${qLabel} · ${timeStr}`;
  } else if(pos.status==='moving'){
    card.className='big-status moving';
    icon.textContent='🚌';
    title.textContent=`กำลังวิ่ง มุ่งหน้า ${nextStop?.name||stopName}`;
    sub.textContent=`${qLabel} · ${timeStr}`;
  } else {
    card.className='big-status no-data';
    icon.textContent='🚌'; title.textContent=stopName; sub.textContent=timeStr;
  }
}

function renderRouteStrip(pos){
  const stops=curStops();
  const stopIdx=(pos&&pos.direction===viewDir)?pos.stopIdx:null;
  document.getElementById('routeVisual').innerHTML=stops.map((s,i)=>{
    const isA=i===stopIdx,isP=stopIdx!==null&&i<stopIdx;
    return `<div class="stop-col">
      <div class="stop-dot-w">${isA?'<div class="bus-anim">🚌</div>':''}
        <div class="stop-dot ${isA?'active':isP?'passed':''}"></div>
      </div>
      <div class="sn ${isA?'active':''}">${s.name}</div>
    </div>${i<stops.length-1?`<div class="line-seg ${isP?'passed':''}"></div>`:''}`;
  }).join('');
}

function renderSched(){
  const trips=curTrips(),stops=curStops(),now=nowMin(),cur=findCurTrip();
  document.getElementById('schedHead').innerHTML=
    `<div>คิว</div>${stops.map(s=>`<div>${s.name.replace('ท่ารถ','').replace('ขนส่ง','')}</div>`).join('')}`;
  document.getElementById('schedBody').innerHTML=trips.map((t,i)=>{
    const done=now>toMin(t.times[2])+10,isCur=i===cur;
    return `<div class="trip-row ${isCur?'cur':''} ${done&&!isCur?'done-row':''}">
      <div><span class="queue-badge">คิว ${t.q}</span></div>
      ${t.times.map((x,j)=>`<div class="t-cell ${done&&!isCur?'done':''}">${x}${isCur&&j===0?'<span class="now-b">วิ่งอยู่</span>':''}</div>`).join('')}
    </div>`;
  }).join('');
}

function renderNextBus(){
  const next=findNextTrip(),trips=curTrips();
  if(next===null){document.getElementById('nextTime').textContent='--:--';document.getElementById('nextDetail').textContent='ไม่มีรถแล้วในวันนี้';return;}
  const dep=trips[next].times[0],diff=toMin(dep)-nowMin();
  document.getElementById('nextTime').textContent=dep+' น.';
  document.getElementById('nextDetail').textContent=diff<=0?'กำลังจะออก!':`อีก ${diff} นาที · คิวที่ ${trips[next].q}`;
}

function renderMap(pos){
  if(!pos) return;
  const dir=pos.direction==='back'?STOPS_BACK:STOPS_GO;
  let latlng;
  if(pos.lat&&pos.lng) latlng=[pos.lat,pos.lng];
  else { const s=dir[pos.stopIdx]; if(s) latlng=[s.lat,s.lng]; }
  if(latlng){
    if(!busMarker) busMarker=L.marker(latlng,{icon:busIcon}).addTo(map);
    else busMarker.setLatLng(latlng);
    map.setView(latlng,12);
  }
}

function fullRender(pos){
  renderBigStatus(pos);
  renderRouteStrip(pos);
  renderSched();
  renderNextBus();
  renderMap(pos);
  const el=document.getElementById('lastUpdate');
  el.textContent=pos?`เมื่อ ${new Date(pos.ts).toTimeString().slice(0,5)} น.`:'ยังไม่มีข้อมูล';
}

document.getElementById('tabGo').addEventListener('click',()=>{
  viewDir='go';
  document.getElementById('tabGo').classList.add('active');
  document.getElementById('tabBack').classList.remove('active');
  fullRender(lastPos);
});
document.getElementById('tabBack').addEventListener('click',()=>{
  viewDir='back';
  document.getElementById('tabBack').classList.add('active');
  document.getElementById('tabGo').classList.remove('active');
  fullRender(lastPos);
});

onValue(ref(db,'bus/car1'),snap=>{lastPos=snap.val();fullRender(lastPos);});

function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  const d=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateText').textContent=`${d[n.getDay()]} ${n.getDate()} ${m[n.getMonth()]} ${n.getFullYear()+543}`;
  renderNextBus();
}
tick(); setInterval(tick,1000);
fullRender(null);
</script>
</body>
</html>
