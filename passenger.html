<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รถตู้ สนามชัย – ฉะเชิงเทรา</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  font-family:'Kanit',sans-serif;
  margin:0;
  background:#f8fafc;
}
header{
  background:#f97316;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:700;
  font-size:18px;
}
#map{
  height:250px;
}
.section{
  padding:15px;
}
.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.queue-title{
  font-weight:700;
  color:#f97316;
  margin-top:15px;
}
.trip{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  padding:6px 0;
  border-bottom:1px solid #eee;
}
.active{
  background:#fff7ed;
  font-weight:600;
}
.bus-icon{
  font-size:28px;
}
</style>
</head>

<body>

<header>
รถตู้ สนามชัย – ฉะเชิงเทรา
</header>

<div id="map"></div>

<div class="section">
  <div class="card" id="currentStatus">
    กำลังโหลดข้อมูล...
  </div>

  <div id="schedule"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/////////////////////////////////////////////////////
// ตารางรถ 4 คิว
/////////////////////////////////////////////////////

const QUEUES = [
{
  name:"คิว 1",
  trips:[
    {from:"สนามชัย",to:"แปดริ้ว",start:"09:00",end:"10:00"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"11:20",end:"12:20"}
  ]
},
{
  name:"คิว 2",
  trips:[
    {from:"สนามชัย",to:"แปดริ้ว",start:"10:40",end:"11:40"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"12:20",end:"13:30"},
    {from:"สนามชัย",to:"แปดริ้ว",start:"13:40",end:"14:40"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"15:20",end:"16:20"}
  ]
},
{
  name:"คิว 3",
  trips:[
    {from:"สนามชัย",to:"แปดริ้ว",start:"06:20",end:"07:20"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"09:40",end:"10:40"},
    {from:"สนามชัย",to:"แปดริ้ว",start:"12:10",end:"13:10"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"14:00",end:"15:00"}
  ]
},
{
  name:"คิว 4",
  trips:[
    {from:"สนามชัย",to:"แปดริ้ว",start:"14:00",end:"15:00"},
    {from:"แปดริ้ว",to:"สนามชัย",start:"16:20",end:"17:20"}
  ]
}
];

/////////////////////////////////////////////////////
// แผนที่
/////////////////////////////////////////////////////

const map = L.map('map').setView([13.7,101.3],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const busIcon = L.divIcon({
  html:'🚌',
  className:'',
  iconSize:[30,30],
  iconAnchor:[15,15]
});

let busMarker = null;

/////////////////////////////////////////////////////
// ฟังก์ชันเวลา
/////////////////////////////////////////////////////

function toMin(t){
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}

function nowMin(){
  const d=new Date();
  return d.getHours()*60+d.getMinutes();
}

/////////////////////////////////////////////////////
// แสดงคิวปัจจุบัน
/////////////////////////////////////////////////////

function getCurrentTrip(){
  const now=nowMin();

  for(let q of QUEUES){
    for(let trip of q.trips){
      if(now>=toMin(trip.start) && now<=toMin(trip.end)){
        return `${q.name} : ${trip.from} → ${trip.to}`;
      }
    }
  }
  return "ยังไม่มีรถกำลังวิ่ง";
}

/////////////////////////////////////////////////////
// แสดงตารางทั้งหมด
/////////////////////////////////////////////////////

function renderSchedule(){
  let html="";

  QUEUES.forEach(q=>{
    html+=`<div class="queue-title">${q.name}</div>`;

    q.trips.forEach(trip=>{
      const active =
        nowMin()>=toMin(trip.start) &&
        nowMin()<=toMin(trip.end);

      html+=`
      <div class="trip ${active?'active':''}">
        <span>${trip.from} → ${trip.to}</span>
        <span>${trip.start} - ${trip.end}</span>
      </div>
      `;
    });
  });

  document.getElementById("schedule").innerHTML=html;
}

/////////////////////////////////////////////////////
// Firebase รับตำแหน่งรถ
/////////////////////////////////////////////////////

onValue(ref(db,'bus/car1'), snap=>{
  const pos=snap.val();

  document.getElementById("currentStatus").innerText=
    pos ? "🚌 รถกำลังวิ่ง" : "ยังไม่มีข้อมูลจากรถ";

  if(pos && pos.lat && pos.lng){
    const latlng=[pos.lat,pos.lng];

    if(!busMarker){
      busMarker=L.marker(latlng,{icon:busIcon}).addTo(map);
    }else{
      busMarker.setLatLng(latlng);
    }

    map.setView(latlng,13);
  }
});

/////////////////////////////////////////////////////
// เริ่มทำงาน
/////////////////////////////////////////////////////

renderSchedule();
setInterval(renderSchedule,60000);

</script>

</body>
</html>
