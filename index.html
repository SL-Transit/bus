<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบบริการผู้โดยสารอัจฉริยะ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* นำเข้าฟอนต์ Sarabun เพื่อความเป็นทางการและอ่านง่าย */
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background-color: #f0f7ff; /* สีฟ้าอ่อนนุ่มนวล */
      color: #2c3e50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0, 50, 100, 0.08);
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    .header-icon {
      width: 80px;
      height: 80px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a3a5f;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 18px;
      color: #5d6d7e;
      margin-bottom: 35px;
      font-weight: 400;
    }

    /* สไตล์ปุ่มแบบทางการ โทนสีนุ่มนวล (Muted Colors) ตามที่คุณต้องการ */
    .btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 22px 25px;
      margin-bottom: 18px;
      font-size: 22px;
      font-weight: 600;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      text-align: left;
    }

    .btn:active {
      transform: translateY(2px);
      filter: brightness(0.9);
    }

    /* โทนน้ำเงินนุ่มนวล (Soft Blue) */
    .btn-blue {
      background: linear-gradient(135deg, #5c9ce6, #4a80c4);
      box-shadow: 0 8px 20px rgba(92, 156, 230, 0.2);
    }

    /* โทนแดงนุ่มนวล (Soft Red) */
    .btn-red {
      background: linear-gradient(135deg, #e86c6c, #c94c4c);
      box-shadow: 0 8px 20px rgba(232, 108, 108, 0.2);
    }
    
    /* โทนน้ำเงินเข้มทางการ (Dark Slate) */
    .btn-dark {
      background: linear-gradient(135deg, #546e7a, #37474f);
      box-shadow: 0 8px 20px rgba(55, 71, 79, 0.2);
    }

    .icon-box {
      background: rgba(255, 255, 255, 0.2);
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      font-size: 24px;
    }

    .btn-text {
      flex: 1;
    }

    .arrow {
      font-size: 18px;
      opacity: 0.7;
    }

    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .footer-text {
      font-size: 14px;
      color: #bdc3c7;
      letter-spacing: 0.5px;
    }

    /* ปรับปรุงสำหรับมือถือ */
    @media (max-width: 400px) {
      .container { padding: 30px 20px; }
      h1 { font-size: 22px; }
      .btn { font-size: 19px; padding: 18px 20px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header-icon">🚍</div>
    <h1>ระบบบริการผู้โดยสารอัจฉริยะ</h1>
    <p class="subtitle">เริ่มต้นการเดินทางที่สมาร์ทไปกับเรา</p>

    <!-- ลำดับที่ 1: ข้อมูลเที่ยวรถ/สถานะบริการ (ย้ายขึ้นมาตามที่ปรึกษา) -->
    <a href="passenger.html" class="btn btn-blue">
      <div class="icon-box">📋</div>
      <span class="btn-text">ข้อมูลเที่ยวรถ/สถานะบริการ</span>
      <span class="arrow">❯</span>
    </a>

    <!-- ลำดับที่ 2: จองตั๋วออนไลน์ -->
    <a href="booking.html" class="btn btn-red">
      <div class="icon-box">🎟️</div>
      <span class="btn-text">จองตั๋วออนไลน์</span>
      <span class="arrow">❯</span>
    </a>

    <!-- ลำดับที่ 3: ตรวจสอบข้อมูลตั๋ว -->
    <a href="check_ticket.html" class="btn btn-dark">
      <div class="icon-box">🔍</div>
      <span class="btn-text">ตรวจสอบข้อมูลตั๋ว</span>
      <span class="arrow">❯</span>
    </a>

    <div class="footer">
      <p class="footer-text">SMART PASSENGER SERVICE SYSTEM</p>
    </div>
  </div>

</body>
</html>
