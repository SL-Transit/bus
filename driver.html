<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าคนขับ – สาย 1</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #f97316; --orange-dk: #c2410c;
  --bg: #18181b; --card: #27272a; --border: #3f3f46;
  --text: #fafafa; --muted: #a1a1aa; --green: #22c55e;
}
body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.topbar { background: var(--orange-dk); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { font-family: 'Chakra Petch', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
.driver-badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #fed7aa; font-weight: 600; }
.main { padding: 18px; max-width: 420px; margin: 0 auto; }
.clock-card { background: var(--card); border-radius: 14px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border: 1px solid var(--border); }
.big-clock { font-family: 'Chakra Petch', sans-serif; font-size: 30px; font-weight: 700; color: var(--orange); letter-spacing: 3px; }
.date-small { font-size: 12px; color: var(--muted); }
.status-bar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.spin { background: var(--orange); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.auto-badge { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--green); margin-bottom: 14px; }
.trip-selector { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.trip-selector label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 8px; }
.trip-selector select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Kanit', sans-serif; font-size: 14px; padding: 9px 12px; outline: none; }
.current-status { background: linear-gradient(135deg,#1c1917,#292524); border: 1.5px solid var(--orange); border-radius: 14px; padding: 14px 18px; margin-bottom: 18px; }
.cs-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; }
.cs-value { font-size: 17px; font-weight: 700; color: var(--orange); }
.cs-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.section-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; font-weight: 600; margin-bottom: 10px; }
.stops-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.stop-btn { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; width: 100%; text-align: left; font-family: 'Kanit', sans-serif; transition: all 0.2s; }
.stop-btn.active { border-color: var(--orange); background: #1f1410; box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
.stop-btn.passed { opacity: 0.45; }
.stop-left { display: flex; align-items: center; gap: 12px; }
.stop-num { width: 30px; height: 30px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Chakra Petch', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.stop-btn.active .stop-num { background: var(--orange); color: #fff; }
.stop-name-t { font-size: 16px; font-weight: 600; }
.stop-btn.active .stop-name-t { color: var(--orange); }
.stop-time-t { font-size: 12px; color: var(--muted); margin-top: 1px; }
.check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; }
.stop-btn.active .check { background: var(--orange); border-color: var(--orange); }
.stop-btn.passed .check { background: #16a34a; border-color: #16a34a; }
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.btn { border: none; border-radius: 12px; padding: 13px; font-family: 'Kanit', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-orange { background: var(--orange); color: #fff; }
.btn-outline { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
.btn-send { width: 100%; background: var(--green); color: #fff; font-size: 16px; padding: 15px; border-radius: 14px; border: none; font-family: 'Kanit', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
.btn-send:active { transform: scale(0.98); }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #fff; padding: 11px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; transition: transform 0.3s; white-space: nowrap; z-index: 999; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🚌 หน้าคนขับ</div>
  <div class="driver-badge">สาย 1</div>
</div>
<div class="main">
  <div class="clock-card">
    <div>
      <div class="big-clock" id="clock">--:--:--</div>
      <div class="date-small" id="dateText"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--muted)">เที่ยวที่วิ่ง</div>
      <div style="font-size:20px;font-weight:700;color:var(--orange)" id="tripLabel">–</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot spin" id="gpsDot"></div>
    <span id="gpsText">กำลังหา GPS...</span>
  </div>
  <div class="status-bar">
    <div class="dot spin" id="fbDot"></div>
    <span id="fbText">กำลังเชื่อม Firebase...</span>
  </div>

  <div class="auto-badge">⚡ ส่งตำแหน่ง GPS ให้ผู้โดยสารอัตโนมัติทุก 10 วินาที</div>

  <div class="trip-selector">
    <label>เลือกเที่ยวที่กำลังวิ่ง</label>
    <select id="tripSelect"></select>
  </div>

  <div class="current-status">
    <div class="cs-label">สถานะที่ผู้โดยสารเห็น</div>
    <div class="cs-value" id="csValue">รอ GPS...</div>
    <div class="cs-sub" id="csSub">ระบบจะส่งอัตโนมัติเมื่อ GPS พร้อม</div>
  </div>

  <div class="section-label">ป้ายที่ใกล้ที่สุด (แตะเพื่อแก้ไข)</div>
  <div class="stops-grid" id="stopsGrid"></div>

  <div class="action-row">
    <button class="btn btn-orange" id="btnTowards">🚌 กำลังเดินทาง</button>
    <button class="btn btn-outline" id="btnAt">🛑 จอดรับผู้โดยสาร</button>
  </div>

  <button class="btn-send" id="btnSend">📡 ส่งตำแหน่งทันที</button>

  <div style="text-align:center;margin-top:4px">
    <a href="passenger.html" style="color:var(--muted);font-size:12px;text-decoration:none">← ดูหน้าผู้โดยสาร</a>
  </div>
</div>
<div class="toast" id="toast">✅ ส่งแล้ว!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3HmQyRJfpw931mr_6eL19xzFk2bbqfVI",
  authDomain: "bus-line1-ba0ea.firebaseapp.com",
  databaseURL: "https://bus-line1-ba0ea-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bus-line1-ba0ea",
  storageBucket: "bus-line1-ba0ea.firebasestorage.app",
  messagingSenderId: "511401517598",
  appId: "1:511401517598:web:5605ee3777619dffe1c40f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const busRef = ref(db, 'bus/car1');

document.getElementById('fbDot').className = 'dot ok';
document.getElementById('fbText').textContent = 'เชื่อม Firebase สำเร็จ ✓';

const STOPS = ['สนามชัย','พนมสารคาม','ขนส่งฉะเชิงเทรา'];
const TRIPS = [
  ['06:00','06:45','07:15'],['07:00','07:45','08:15'],
  ['08:00','08:45','09:15'],['09:00','09:45','10:15'],
  ['10:30','11:15','11:45'],['12:00','12:45','13:15'],
  ['13:30','14:15','14:45'],['15:00','15:45','16:15'],
  ['16:30','17:15','17:45'],['17:30','18:15','18:45'],
];

let selStop = 0, selStatus = 'at', selTrip = 0, gps = null, autoTimer = null;

function toMin(hhmm) { const [h,m] = hhmm.split(':').map(Number); return h*60+m; }
function nowMin() { const n = new Date(); return n.getHours()*60+n.getMinutes(); }

// Build trip dropdown
function buildTrips() {
  const sel = document.getElementById('tripSelect');
  const now = nowMin(); let best = 0;
  TRIPS.forEach((t, i) => {
    if (now >= toMin(t[0]) - 30) best = i;
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `เที่ยวที่ ${i+1}  (${t[0]} → ${t[2]})`;
    sel.appendChild(o);
  });
  sel.value = best; selTrip = best;
  document.getElementById('tripLabel').textContent = `เที่ยวที่ ${best+1}`;
  sel.addEventListener('change', () => {
    selTrip = parseInt(sel.value);
    document.getElementById('tripLabel').textContent = `เที่ยวที่ ${selTrip+1}`;
    render();
  });
}

function render() {
  const trip = TRIPS[selTrip];
  const grid = document.getElementById('stopsGrid');
  grid.innerHTML = STOPS.map((n, i) => `
    <button class="stop-btn ${i===selStop?'active':i<selStop?'passed':''}" data-idx="${i}">
      <div class="stop-left">
        <div class="stop-num">${i+1}</div>
        <div>
          <div class="stop-name-t">${n}</div>
          <div class="stop-time-t">${trip[i]} น.</div>
        </div>
      </div>
      <div class="check">${i<selStop?'✓':i===selStop?'📍':''}</div>
    </button>`).join('');

  // Bind click on each stop button
  grid.querySelectorAll('.stop-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selStop = parseInt(btn.dataset.idx);
      render();
      updateDisplay();
    });
  });
}

function updateDisplay() {
  const stopName = STOPS[selStop];
  document.getElementById('csValue').textContent =
    selStatus === 'at' ? `🛑 จอดอยู่ที่ ${stopName}` : `🚌 กำลังมุ่งหน้า ${stopName}`;
}

async function send() {
  try {
    await set(busRef, {
      stopIdx: selStop, status: selStatus, tripIdx: selTrip,
      ts: Date.now(), lat: gps?.lat||null, lng: gps?.lng||null, acc: gps?.acc||null
    });
    const t = new Date().toTimeString().slice(0,5);
    document.getElementById('csSub').textContent = `✅ ส่งแล้วเมื่อ ${t} น.`;
    showToast('✅ ส่งตำแหน่งแล้ว!');
  } catch(e) {
    document.getElementById('csSub').textContent = '❌ ส่งไม่ได้ – ตรวจสอบเน็ต';
    showToast('❌ ส่งไม่ได้!');
  }
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsText').textContent = 'ไม่รองรับ GPS';
    return;
  }
  navigator.geolocation.watchPosition(pos => {
    gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) };
    document.getElementById('gpsDot').className = 'dot ok';
    document.getElementById('gpsText').textContent =
      `GPS ✓  ±${gps.acc}ม.  (${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)})`;
    updateDisplay();
    if (!autoTimer) { send(); autoTimer = setInterval(send, 10000); }
  }, () => {
    document.getElementById('gpsDot').className = 'dot';
    document.getElementById('gpsText').textContent = 'GPS ไม่ได้ – กด "ส่งตำแหน่งทันที" เองได้';
  }, { enableHighAccuracy: true, timeout: 15000 });
}

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toTimeString().slice(0,8);
  const d = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateText').textContent =
    `${d[n.getDay()]} ${n.getDate()} ${m[n.getMonth()]} ${n.getFullYear()+543}`;
}

// Bind buttons via JS (not onclick attr — fixes the module scope error)
document.getElementById('btnTowards').addEventListener('click', () => { selStatus='towards'; updateDisplay(); });
document.getElementById('btnAt').addEventListener('click', () => { selStatus='at'; updateDisplay(); });
document.getElementById('btnSend').addEventListener('click', send);

// Init
tick(); setInterval(tick, 1000);
buildTrips(); render(); updateDisplay(); startGPS();
</script>
</body>
</html>
