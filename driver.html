<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าคนขับ – สาย 1</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange:#f97316; --orange-dk:#c2410c;
  --bg:#18181b; --card:#27272a; --border:#3f3f46;
  --text:#fafafa; --muted:#a1a1aa; --green:#22c55e; --blue:#3b82f6; --yellow:#eab308;
}
body { font-family:'Kanit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.topbar { background:var(--orange-dk); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
.topbar-title { font-family:'Chakra Petch',sans-serif; font-size:18px; font-weight:700; color:#fff; }
.driver-badge { background:rgba(255,255,255,0.15); border-radius:20px; padding:4px 12px; font-size:12px; color:#fed7aa; font-weight:600; }
.main { padding:18px; max-width:420px; margin:0 auto; }
.clock-card { background:var(--card); border-radius:14px; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; border:1px solid var(--border); }
.big-clock { font-family:'Chakra Petch',sans-serif; font-size:30px; font-weight:700; color:var(--orange); letter-spacing:3px; }
.date-small { font-size:12px; color:var(--muted); }

.status-bar { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:10px; }
.dot { width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0; }
.dot.ok { background:var(--green);box-shadow:0 0 6px var(--green); }
.dot.spin { background:var(--orange);animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Smart status display */
.smart-status {
  border-radius:14px; padding:16px 18px; margin-bottom:14px;
  border:2px solid var(--border); transition:all 0.4s;
}
.smart-status.stopped { background:linear-gradient(135deg,#1c1410,#2a1a10); border-color:#f97316; }
.smart-status.moving  { background:linear-gradient(135deg,#0f1a0f,#152015); border-color:#22c55e; }
.smart-status.approaching { background:linear-gradient(135deg,#1a1a0a,#252510); border-color:#eab308; }
.smart-status.idle    { background:linear-gradient(135deg,#1c1917,#292524); border-color:var(--border); }

.ss-icon { font-size:32px; margin-bottom:6px; }
.ss-status { font-size:18px; font-weight:700; margin-bottom:3px; }
.smart-status.stopped .ss-status { color:var(--orange); }
.smart-status.moving .ss-status  { color:var(--green); }
.smart-status.approaching .ss-status { color:var(--yellow); }
.smart-status.idle .ss-status    { color:var(--muted); }
.ss-detail { font-size:12px; color:var(--muted); }

.auto-badge { background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:14px; }

.queue-card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px; }
.queue-card label { font-size:12px;color:var(--muted);display:block;margin-bottom:10px;font-weight:600; }
.queue-btns { display:grid;grid-template-columns:repeat(4,1fr);gap:8px; }
.q-btn { padding:12px 6px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center; }
.q-btn.active { border-color:var(--orange);background:rgba(249,115,22,0.15);color:var(--orange); }
.q-btn small { display:block;font-family:'Kanit',sans-serif;font-size:9px;margin-top:2px;font-weight:400; }

.dir-card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px; }
.dir-card label { font-size:12px;color:var(--muted);display:block;margin-bottom:10px;font-weight:600; }
.dir-btns { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.dir-btn { padding:12px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center; }
.dir-btn.active-go   { border-color:var(--orange);background:rgba(249,115,22,0.1);color:var(--orange); }
.dir-btn.active-back { border-color:var(--blue);background:rgba(59,130,246,0.1);color:var(--blue); }

.trip-info-card { background:linear-gradient(135deg,#1c1917,#292524);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:14px; }
.trip-info-label { font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px; }
.trip-info-times { display:flex;gap:6px;align-items:center;flex-wrap:wrap; }
.trip-time-chip { background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);border-radius:8px;padding:5px 10px;font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:600;color:var(--orange); }
.trip-time-arrow { color:var(--muted);font-size:12px; }

.section-label { font-size:11px;color:var(--muted);letter-spacing:1.5px;font-weight:600;margin-bottom:10px; }
.stops-grid { display:flex;flex-direction:column;gap:10px;margin-bottom:20px; }
.stop-btn { background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;text-align:left;font-family:'Kanit',sans-serif;transition:all 0.2s; }
.stop-btn.active { border-color:var(--orange);background:#1f1410;box-shadow:0 0 0 3px rgba(249,115,22,0.15); }
.stop-btn.passed { opacity:0.45; }
.stop-left { display:flex;align-items:center;gap:12px; }
.stop-num { width:30px;height:30px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0; }
.stop-btn.active .stop-num { background:var(--orange);color:#fff; }
.stop-name-t { font-size:15px;font-weight:600; }
.stop-btn.active .stop-name-t { color:var(--orange); }
.stop-time-t { font-size:12px;color:var(--muted);margin-top:1px; }
.dist-badge { font-size:11px;color:var(--yellow);background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);border-radius:6px;padding:2px 7px;margin-top:3px;display:inline-block; }
.check { width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px; }
.stop-btn.active .check { background:var(--orange);border-color:var(--orange); }
.stop-btn.passed .check { background:#16a34a;border-color:#16a34a; }

.btn-send { width:100%;background:var(--green);color:#fff;font-size:16px;padding:15px;border-radius:14px;border:none;font-family:'Kanit',sans-serif;font-weight:700;cursor:pointer;margin-bottom:10px; }
.btn-send:active { transform:scale(0.98); }
.toast { position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:700;transition:transform 0.3s;white-space:nowrap;z-index:999; }
.toast.show { transform:translateX(-50%) translateY(0); }

.gps-debug { font-size:10px;color:var(--muted);text-align:center;margin-bottom:8px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🚌 หน้าคนขับ</div>
  <div class="driver-badge">สาย 1</div>
</div>
<div class="main">
  <div class="clock-card">
    <div>
      <div class="big-clock" id="clock">--:--:--</div>
      <div class="date-small" id="dateText"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--muted)">คิว / ทิศทาง</div>
      <div style="font-size:14px;font-weight:700;color:var(--orange)" id="tripLabel">คิว? / ขา?</div>
    </div>
  </div>

  <div class="status-bar"><div class="dot spin" id="gpsDot"></div><span id="gpsText">กำลังหา GPS...</span></div>
  <div class="status-bar"><div class="dot spin" id="fbDot"></div><span id="fbText">กำลังเชื่อม Firebase...</span></div>

  <!-- Smart Status Card -->
  <div class="smart-status idle" id="smartStatus">
    <div class="ss-icon" id="ssIcon">🚌</div>
    <div class="ss-status" id="ssStatus">รอ GPS...</div>
    <div class="ss-detail" id="ssDetail">ระบบจะตรวจจับสถานะอัตโนมัติ</div>
  </div>

  <div class="auto-badge">⚡ ระบบตรวจสถานะอัตโนมัติ · ส่งทุก 10 วินาที</div>

  <div class="queue-card">
    <label>คุณอยู่คิวที่เท่าไหร่?</label>
    <div class="queue-btns">
      <button class="q-btn active" data-q="1" id="q1">1<small>คิว 1</small></button>
      <button class="q-btn" data-q="2" id="q2">2<small>คิว 2</small></button>
      <button class="q-btn" data-q="3" id="q3">3<small>คิว 3</small></button>
      <button class="q-btn" data-q="4" id="q4">4<small>คิว 4</small></button>
    </div>
  </div>

  <div class="dir-card">
    <label>กำลังวิ่งไปทางไหน?</label>
    <div class="dir-btns">
      <button class="dir-btn active-go" id="btnDirGo">▶ ขาไป<br><small>สนามชัย→แปดริ้ว</small></button>
      <button class="dir-btn" id="btnDirBack">◀ ขากลับ<br><small>แปดริ้ว→สนามชัย</small></button>
    </div>
  </div>

  <div class="trip-info-card">
    <div class="trip-info-label">เวลาเที่ยวนี้</div>
    <div class="trip-info-times" id="tripTimes">–</div>
  </div>

  <div class="section-label">ป้ายจอด (แตะเพื่อแก้ไขด้วยตนเอง)</div>
  <div class="stops-grid" id="stopsGrid"></div>

  <div class="gps-debug" id="gpsDebug"></div>

  <button class="btn-send" id="btnSend">📡 ส่งตำแหน่งทันที</button>

  <div style="text-align:center;margin-top:4px">
    <a href="passenger.html" style="color:var(--muted);font-size:12px;text-decoration:none">← ดูหน้าผู้โดยสาร</a>
  </div>
</div>
<div class="toast" id="toast">✅ ส่งแล้ว!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3HmQyRJfpw931mr_6eL19xzFk2bbqfVI",
  authDomain: "bus-line1-ba0ea.firebaseapp.com",
  databaseURL: "https://bus-line1-ba0ea-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bus-line1-ba0ea",
  storageBucket: "bus-line1-ba0ea.firebasestorage.app",
  messagingSenderId: "511401517598",
  appId: "1:511401517598:web:5605ee3777619dffe1c40f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const busRef = ref(db, 'bus/car1');

document.getElementById('fbDot').className='dot ok';
document.getElementById('fbText').textContent='เชื่อม Firebase สำเร็จ ✓';

// ===== DATA =====
const STOPS_GO = [
  {name:'ท่ารถสนามชัยเขต', lat:13.659022, lng:101.437482},
  {name:'พนมสารคาม',        lat:13.745082, lng:101.355993},
  {name:'ขนส่งฉะเชิงเทรา', lat:13.692477, lng:101.054105},
];
const STOPS_BACK = [
  {name:'ขนส่งฉะเชิงเทรา', lat:13.692477, lng:101.054105},
  {name:'พนมสารคาม',        lat:13.745259, lng:101.356835},
  {name:'ท่ารถสนามชัยเขต', lat:13.659022, lng:101.437482},
];
const TRIPS_GO = [
  {q:3,times:['06:20','06:40','07:20']},{q:1,times:['09:00','09:20','10:00']},
  {q:2,times:['10:40','11:00','11:40']},{q:3,times:['12:10','12:30','13:10']},
  {q:2,times:['13:40','14:00','14:40']},{q:4,times:['14:00','14:20','15:00']},
];
const TRIPS_BACK = [
  {q:3,times:['09:40','10:20','10:40']},{q:1,times:['11:20','12:00','12:20']},
  {q:2,times:['12:20','13:00','13:30']},{q:3,times:['14:00','14:40','15:00']},
  {q:2,times:['15:20','16:00','16:20']},{q:4,times:['16:20','17:00','17:20']},
];

// ===== STATE =====
let selStop=0, selDir='go', selQueue=1, autoTimer=null;
let gps=null;

// Movement tracking
let lastMovedTime = Date.now();
let lastMovedLat = null;
let lastMovedLng = null;
let currentAutoStatus = 'idle'; // idle | stopped | moving | approaching

// ===== HELPERS =====
function curStops(){ return selDir==='go'?STOPS_GO:STOPS_BACK; }
function curTrips(){ return selDir==='go'?TRIPS_GO:TRIPS_BACK; }

function findMyTrip(){
  const trips=curTrips();
  const idx=trips.findIndex(t=>t.q===selQueue);
  return idx>=0?idx:null;
}

// Distance between two GPS points in meters (Haversine)
function distMeters(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Find nearest stop and distance to next stop
function getNearestStop(){
  const stops=curStops();
  let nearest=0, nearestDist=Infinity;
  if(!gps) return {nearest:selStop, distToNext:null};
  stops.forEach((s,i)=>{
    const d=distMeters(gps.lat,gps.lng,s.lat,s.lng);
    if(d<nearestDist){ nearestDist=d; nearest=i; }
  });
  // dist to next stop
  const nextIdx = nearest+1 < stops.length ? nearest+1 : nearest;
  const nextStop = stops[nextIdx];
  const distToNext = gps ? distMeters(gps.lat,gps.lng,nextStop.lat,nextStop.lng) : null;
  return {nearest, nearestDist, distToNext, nextIdx};
}

// ===== AUTO STATUS LOGIC =====
function computeAutoStatus(){
  if(!gps) return {status:'idle', stopIdx:selStop};

  const now=Date.now();
  const stops=curStops();
  const {nearest, nearestDist, distToNext, nextIdx} = getNearestStop();

  // Update movement tracking
  if(lastMovedLat===null){
    lastMovedLat=gps.lat; lastMovedLng=gps.lng; lastMovedTime=now;
  } else {
    const moved=distMeters(gps.lat,gps.lng,lastMovedLat,lastMovedLng);
    if(moved>100){
      lastMovedLat=gps.lat; lastMovedLng=gps.lng; lastMovedTime=now;
    }
  }

  const stoppedMs = now - lastMovedTime;
  const stoppedSec = stoppedMs/1000;

  // Update nearest stop in UI
  if(nearest !== selStop){
    selStop = nearest;
  }

  let status, stopIdx=nearest;

  if(stoppedSec >= 120){ 
    // ไม่ขยับ 2 นาที และไม่เคลื่อน 100m → จอดรอ
    status = 'stopped';
  } else if(distToNext!==null && distToNext<=1000 && nextIdx!==nearest){
    // ใกล้ป้ายถัดไปไม่เกิน 1 กม. → ใกล้จะถึง
    status = 'approaching';
  } else {
    // กำลังวิ่ง
    status = 'moving';
  }

  return {status, stopIdx, stoppedSec, distToNext, nearest, nextIdx};
}

function updateSmartStatusUI(info){
  const card=document.getElementById('smartStatus');
  const icon=document.getElementById('ssIcon');
  const statusEl=document.getElementById('ssStatus');
  const detailEl=document.getElementById('ssDetail');
  const stops=curStops();

  if(info.status==='stopped'){
    card.className='smart-status stopped';
    icon.textContent='🛑';
    statusEl.textContent=`จอดรอผู้โดยสาร`;
    detailEl.textContent=`ที่ป้าย ${stops[info.stopIdx]?.name||'?'} · หยุดนิ่ง ${Math.floor(info.stoppedSec/60)} นาที ${info.stoppedSec%60|0} วินาที`;
  } else if(info.status==='approaching'){
    const nextName=stops[info.nextIdx]?.name||'?';
    card.className='smart-status approaching';
    icon.textContent='⚠️';
    statusEl.textContent=`กำลังใกล้จะถึง ${nextName}`;
    detailEl.textContent=`ระยะห่าง ${Math.round(info.distToNext)} เมตร`;
  } else if(info.status==='moving'){
    const nextName=info.nextIdx<stops.length?stops[info.nextIdx]?.name:'ปลายทาง';
    card.className='smart-status moving';
    icon.textContent='🚌';
    statusEl.textContent=`กำลังวิ่ง`;
    detailEl.textContent=`มุ่งหน้า ${nextName}`;
  } else {
    card.className='smart-status idle';
    icon.textContent='🚌';
    statusEl.textContent='รอ GPS...';
    detailEl.textContent='ระบบจะตรวจจับสถานะอัตโนมัติ';
  }
}

// ===== RENDER STOPS =====
function render(){
  const trips=curTrips(); const stops=curStops();
  const tripIdx=findMyTrip();
  document.getElementById('stopsGrid').innerHTML=stops.map((s,i)=>{
    const dist=gps?Math.round(distMeters(gps.lat,gps.lng,s.lat,s.lng)):null;
    return `
    <button class="stop-btn ${i===selStop?'active':i<selStop?'passed':''}" data-idx="${i}">
      <div class="stop-left">
        <div class="stop-num">${i+1}</div>
        <div>
          <div class="stop-name-t">${s.name}</div>
          <div class="stop-time-t">${tripIdx!==null?trips[tripIdx].times[i]:''} น.</div>
          ${dist!==null?`<span class="dist-badge">📍 ${dist<1000?dist+'ม.':(dist/1000).toFixed(1)+'กม.'}</span>`:''}
        </div>
      </div>
      <div class="check">${i<selStop?'✓':i===selStop?'📍':''}</div>
    </button>`;
  }).join('');
  document.querySelectorAll('.stop-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ selStop=parseInt(btn.dataset.idx); render(); });
  });
}

function updateTripTimes(){
  const idx=findMyTrip(); const trips=curTrips(); const stops=curStops();
  const container=document.getElementById('tripTimes');
  if(idx===null){ container.innerHTML='<span style="color:var(--muted);font-size:13px">ไม่มีเที่ยวสำหรับคิวนี้</span>'; return; }
  const t=trips[idx].times;
  container.innerHTML=t.map((time,i)=>
    `${i>0?'<span class="trip-time-arrow">→</span>':''}<div class="trip-time-chip">${time}<div style="font-size:9px;font-weight:400;color:#fed7aa;margin-top:1px">${stops[i].name.replace('ท่ารถ','').replace('ขนส่ง','')}</div></div>`
  ).join('');
}

// ===== SEND =====
async function send(){
  const info = computeAutoStatus();
  currentAutoStatus = info.status;

  // Map auto status to status string for passenger
  let statusStr;
  if(info.status==='stopped')     statusStr='stopped';
  else if(info.status==='approaching') statusStr='approaching';
  else statusStr='moving';

  const tripIdx=findMyTrip();
  try{
    await set(busRef,{
      stopIdx: info.stopIdx,
      status: statusStr,
      tripIdx: tripIdx??0,
      direction: selDir,
      queue: selQueue,
      ts: Date.now(),
      lat: gps?.lat||null,
      lng: gps?.lng||null,
      acc: gps?.acc||null,
      distToNext: info.distToNext||null,
    });
    const t=new Date().toTimeString().slice(0,5);
    document.getElementById('gpsDebug').textContent=`ส่งเมื่อ ${t} · สถานะ: ${statusStr}`;
  }catch(e){
    document.getElementById('gpsDebug').textContent='❌ ส่งไม่ได้';
  }

  updateSmartStatusUI(info);
  render();
}

function showToast(m){
  const t=document.getElementById('toast'); t.textContent=m;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== GPS =====
function startGPS(){
  if(!navigator.geolocation){ document.getElementById('gpsText').textContent='ไม่รองรับ GPS'; return; }
  navigator.geolocation.watchPosition(pos=>{
    const newLat=pos.coords.latitude, newLng=pos.coords.longitude;
    gps={lat:newLat, lng:newLng, acc:Math.round(pos.coords.accuracy)};
    document.getElementById('gpsDot').className='dot ok';
    document.getElementById('gpsText').textContent=`GPS ✓  ±${gps.acc}ม.`;
    if(!autoTimer){
      send(); showToast('✅ เริ่มส่งตำแหน่งแล้ว');
      autoTimer=setInterval(send,10000);
    }
  },()=>{
    document.getElementById('gpsDot').className='dot';
    document.getElementById('gpsText').textContent='GPS ไม่ได้ – กด "ส่งตำแหน่ง" เองได้';
  },{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}

function switchQueue(q){
  selQueue=q;
  document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`q${q}`).classList.add('active');
  selStop=0; render(); updateTripTimes();
  document.getElementById('tripLabel').textContent=`คิว ${selQueue} / ${selDir==='go'?'ขาไป':'ขากลับ'}`;
}

function switchDir(dir){
  selDir=dir; selStop=0;
  document.getElementById('btnDirGo').className  = dir==='go'  ?'dir-btn active-go':'dir-btn';
  document.getElementById('btnDirBack').className = dir==='back'?'dir-btn active-back':'dir-btn';
  render(); updateTripTimes();
  document.getElementById('tripLabel').textContent=`คิว ${selQueue} / ${selDir==='go'?'ขาไป':'ขากลับ'}`;
}

function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  const d=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateText').textContent=`${d[n.getDay()]} ${n.getDate()} ${m[n.getMonth()]} ${n.getFullYear()+543}`;
}

// Bind
document.querySelectorAll('.q-btn').forEach(b=>b.addEventListener('click',()=>switchQueue(parseInt(b.dataset.q))));
document.getElementById('btnDirGo').addEventListener('click',()=>switchDir('go'));
document.getElementById('btnDirBack').addEventListener('click',()=>switchDir('back'));
document.getElementById('btnSend').addEventListener('click',()=>{ send(); showToast('✅ ส่งตำแหน่งแล้ว!'); });

tick(); setInterval(tick,1000);
render(); updateTripTimes(); startGPS();
</script>
</body>
</html>
